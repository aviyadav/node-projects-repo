<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plotly TypeScript Demo</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f6f7fb;
        color: #1c2230;
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      h1 {
        margin: 0 0 16px;
      }

      #app {
        display: grid;
        gap: 16px;
      }

      .chart-panel {
        background: white;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 22px rgba(13, 26, 54, 0.08);
      }

      .chart-title {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 600;
      }

      .chart-canvas {
        min-height: 320px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Plotly Charts Playground</h1>
      <div id="app"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
